---
# Exclude build configuration files from security checks.
# These files are build-time scripts that use Rollup's internal module resolution,
# not web-facing code that processes untrusted user input.
engines:
  semgrep:
    exclude_paths:
      - '**/rollup.config.mjs'

# CLI detector tests walk fixture directories colocated with the test file,
# never any external input.
exclude_paths:
  - 'packages/instantsearch-cli/__tests__/**'
