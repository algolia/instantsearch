name: 'Setup Node.js and Dependencies'
description: 'Sets up Node.js and caches/installs dependencies'

inputs:
  install-dependencies:
    description: 'Whether to install dependencies (set to false if only downloading artifacts)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
      shell: bash

    - name: Cache node_modules
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          */*/node_modules
          scripts/legacy/algoliasearch@5-dependency-container/node_modules
          scripts/legacy/algoliasearch-v4-dependency-container/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          node-modules-${{ runner.os }}-
      shell: bash

    - name: Install dependencies
      if: inputs.install-dependencies == 'true' && steps.cache-node-modules.outputs.cache-hit != 'true'
      run: yarn install --frozen-lockfile
      shell: bash
